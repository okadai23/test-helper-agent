<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acme Shop — 購入手続き</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="shop-header">
      <a href="index.html" class="brand">Acme Shop</a>
      <nav class="shop-nav">
        <a href="index.html">商品</a>
        <a href="cart.html" data-testid="nav-cart">カート(<span id="cart-count">0</span>)</a>
        <a id="account-link" href="login.html" data-testid="nav-login">ログイン</a>
      </nav>
    </header>
    <main class="container">
      <h1>購入手続き</h1>
      <form id="checkout-form" class="panel" data-testid="checkout-form">
        <label>お名前<input id="name" required data-testid="checkout-name"/></label>
        <label>住所<input id="address" required data-testid="checkout-address"/></label>
        <label>支払い方法
          <select id="payment" data-testid="checkout-payment">
            <option value="card">クレジットカード</option>
            <option value="bank">銀行振込</option>
          </select>
        </label>
        <button class="btn" type="submit" data-testid="checkout-submit">注文を確定</button>
        <p id="checkout-result" role="status" aria-live="polite"></p>
      </form>
    </main>
  </body>
  </html>
