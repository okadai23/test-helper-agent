<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acme Shop — ログイン</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="shop-header">
      <a href="index.html" class="brand">Acme Shop</a>
      <nav class="shop-nav">
        <a href="index.html">商品</a>
        <a href="cart.html" data-testid="nav-cart">カート(<span id="cart-count">0</span>)</a>
        <a id="account-link" href="login.html" data-testid="nav-login">ログイン</a>
      </nav>
    </header>
    <main class="container">
      <h1>ログイン</h1>
      <form id="login-form" class="panel" data-testid="login-form">
        <label>メール<input id="email" type="email" required data-testid="login-email"/></label>
        <label>パスワード<input id="password" type="password" required data-testid="login-password"/></label>
        <button class="btn" type="submit" data-testid="login-submit">ログイン</button>
        <p id="login-result" role="status" aria-live="polite"></p>
      </form>
    </main>
  </body>
  </html>
