name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
        activate-environment: true

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Run linting
      run: |
        nox -s lint

    - name: Run formatting check
      run: |
        nox -s format_code

    - name: Debug env and paths
      run: |
        echo "=== Debug: CI Environment ==="
        pwd
        python --version
        which python
        echo "=== PYTHONPATH ==="
        echo "$PYTHONPATH"
        echo "=== Project Tree (top) ==="
        ls -la
        echo "=== Project Tree (src) ==="
        ls -la src || true
        echo "=== Project Tree (src/test_helper) ==="
        ls -la src/test_helper || true
    - name: Run type checking
      run: |
        nox -s typing

    - name: Run tests
      run: |
        nox -s test

    - name: Run security checks
      run: |
        nox -s security

  docs:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
        activate-environment: true

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Build documentation
      run: |
        nox -s docs
