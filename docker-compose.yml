version: '3.8'

services:
  temporal-server:
    image: temporalio/auto-setup:1.24.2
    container_name: temporal-server
    ports:
      - "7233:7233"  # gRPC port
      - "8233:8233"  # HTTP port
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      - postgres
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig
    networks:
      - temporal-network

  temporal-ui:
    image: temporalio/ui:2.29.0
    container_name: temporal-ui
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal-server:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal-server
    networks:
      - temporal-network

  postgres:
    image: postgres:15-alpine
    container_name: temporal-postgres
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    networks:
      - temporal-network

  # Playwright MCP service for browser automation
  playwright-mcp:
    image: mckaywrigley/playwright-mcp:latest
    container_name: playwright-mcp
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - MCP_PORT=3001
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    volumes:
      - playwright_browsers:/ms-playwright
    networks:
      - temporal-network
    command: ["npm", "start"]

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: temporal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - temporal-network

networks:
  temporal-network:
    driver: bridge

volumes:
  temporal_postgres_data:
  playwright_browsers:
  redis_data: